openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SmartHire API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: interviews
    description: Interview management
  - name: scorecards
    description: Scorecard retrieval
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /interviews:
    get:
      operationId: listInterviews
      tags: [interviews]
      summary: List all interviews
      description: Returns all interviews with their status and scores
      responses:
        "200":
          description: List of interviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Interview"
    post:
      operationId: createInterview
      tags: [interviews]
      summary: Create interview and generate questions
      description: Creates a new interview from a job description and generates questions via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInterviewBody"
      responses:
        "201":
          description: Interview created with generated questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewWithQuestions"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /interviews/{id}:
    get:
      operationId: getInterview
      tags: [interviews]
      summary: Get a single interview
      description: Returns interview details with questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interview details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewWithQuestions"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /interviews/{id}/submit:
    post:
      operationId: submitInterview
      tags: [interviews]
      summary: Submit candidate answers and trigger evaluation
      description: Submits candidate answers and triggers AI evaluation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitInterviewBody"
      responses:
        "200":
          description: Evaluation complete, scorecard created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scorecard"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Interview not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /interviews/{id}/scorecard:
    get:
      operationId: getScorecard
      tags: [scorecards]
      summary: Get scorecard for an interview
      description: Returns the AI-generated scorecard for a completed interview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scorecard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScorecardWithDetails"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /interviews/stats:
    get:
      operationId: getInterviewStats
      tags: [interviews]
      summary: Get interview statistics
      description: Returns aggregated stats for the dashboard
      responses:
        "200":
          description: Interview statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Interview:
      type: object
      properties:
        id:
          type: integer
        recruiterName:
          type: string
        candidateName:
          type: string
        candidateEmail:
          type: string
        jobTitle:
          type: string
        jobDescription:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, evaluating]
        overallScore:
          type: ["number", "null"]
        verdict:
          type: ["string", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]
        duration:
          type: ["integer", "null"]
      required:
        - id
        - recruiterName
        - candidateName
        - candidateEmail
        - jobTitle
        - jobDescription
        - status
        - overallScore
        - verdict
        - createdAt
        - completedAt
        - duration

    Question:
      type: object
      properties:
        id:
          type: integer
        interviewId:
          type: integer
        questionIndex:
          type: integer
        questionText:
          type: string
        questionType:
          type: string
          enum: [technical, behavioral, situational]
      required:
        - id
        - interviewId
        - questionIndex
        - questionText
        - questionType

    Answer:
      type: object
      properties:
        id:
          type: integer
        questionId:
          type: integer
        questionIndex:
          type: integer
        answerText:
          type: string
        score:
          type: ["number", "null"]
        feedback:
          type: ["string", "null"]
      required:
        - id
        - questionId
        - questionIndex
        - answerText
        - score
        - feedback

    InterviewWithQuestions:
      type: object
      properties:
        id:
          type: integer
        recruiterName:
          type: string
        candidateName:
          type: string
        candidateEmail:
          type: string
        jobTitle:
          type: string
        jobDescription:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, evaluating]
        overallScore:
          type: ["number", "null"]
        verdict:
          type: ["string", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]
        duration:
          type: ["integer", "null"]
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
      required:
        - id
        - recruiterName
        - candidateName
        - candidateEmail
        - jobTitle
        - jobDescription
        - status
        - overallScore
        - verdict
        - createdAt
        - completedAt
        - duration
        - questions

    Scorecard:
      type: object
      properties:
        id:
          type: integer
        interviewId:
          type: integer
        technicalScore:
          type: number
        communicationScore:
          type: number
        problemSolvingScore:
          type: number
        roleRelevanceScore:
          type: number
        overallScore:
          type: number
        verdict:
          type: string
        strengths:
          type: array
          items:
            type: string
        improvements:
          type: array
          items:
            type: string
        summary:
          type: string
        recruiterNote:
          type: string
        createdAt:
          type: string
      required:
        - id
        - interviewId
        - technicalScore
        - communicationScore
        - problemSolvingScore
        - roleRelevanceScore
        - overallScore
        - verdict
        - strengths
        - improvements
        - summary
        - recruiterNote
        - createdAt

    ScorecardWithDetails:
      type: object
      properties:
        scorecard:
          $ref: "#/components/schemas/Scorecard"
        interview:
          $ref: "#/components/schemas/Interview"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/Answer"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
      required:
        - scorecard
        - interview
        - answers
        - questions

    CreateInterviewBody:
      type: object
      properties:
        recruiterName:
          type: string
        candidateName:
          type: string
        candidateEmail:
          type: string
        jobTitle:
          type: string
        jobDescription:
          type: string
      required:
        - recruiterName
        - candidateName
        - candidateEmail
        - jobTitle
        - jobDescription

    SubmitInterviewBody:
      type: object
      properties:
        answers:
          type: array
          items:
            type: object
            properties:
              questionIndex:
                type: integer
              answerText:
                type: string
            required:
              - questionIndex
              - answerText
      required:
        - answers

    InterviewStats:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        averageScore:
          type: ["number", "null"]
        verdictBreakdown:
          type: object
          properties:
            strongHire:
              type: integer
            hire:
              type: integer
            maybe:
              type: integer
            noHire:
              type: integer
          required:
            - strongHire
            - hire
            - maybe
            - noHire
      required:
        - total
        - completed
        - pending
        - averageScore
        - verdictBreakdown
